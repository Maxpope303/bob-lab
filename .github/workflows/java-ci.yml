name: Java Modernization CI/CD Pipeline

on:
  push:
    branches:
      - demo-java8-baseline
      - demo-modernized
      - main
    paths:
      - 'simple-pharmacy-twas-j8-struts-V2/**'
      - 'pom.xml'
  pull_request:
    branches:
      - demo-java8-baseline
      - demo-modernized
      - main
    paths:
      - 'simple-pharmacy-twas-j8-struts-V2/**'
      - 'pom.xml'
  workflow_dispatch:

env:
  MAVEN_OPTS: -Xmx1024m
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/simple-pharmacy
  WORKING_DIR: simple-pharmacy-twas-j8-struts-V2

jobs:
  setup:
    name: Setup Build Configuration
    runs-on: ubuntu-latest
    outputs:
      java-version: ${{ steps.config.outputs.java-version }}
      runtime: ${{ steps.config.outputs.runtime }}
    steps:
      - name: Determine Configuration
        id: config
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/demo-java8-baseline" ]]; then
            echo "java-version=8" >> $GITHUB_OUTPUT
            echo "runtime=websphere-traditional" >> $GITHUB_OUTPUT
          else
            echo "java-version=17" >> $GITHUB_OUTPUT
            echo "runtime=liberty" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    name: Build & Test (Java ${{ needs.setup.outputs.java-version }})
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ needs.setup.outputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ needs.setup.outputs.java-version }}
          distribution: 'semeru'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install WebSphere dependency
        run: |
          mvn install:install-file \
            -Dfile=was_dependency/was_public-9.0.0.jar \
            -DpomFile=was_dependency/was_public-9.0.0.pom

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run Unit Tests
        run: mvn test -B

      - name: Generate Code Coverage Report
        run: mvn jacoco:report

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ${{ env.WORKING_DIR }}/target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true
        with:
          files: |
            ${{ env.WORKING_DIR }}/target/surefire-reports/*.xml

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-java${{ needs.setup.outputs.java-version }}
          path: |
            ${{ env.WORKING_DIR }}/target/surefire-reports/
            ${{ env.WORKING_DIR }}/target/site/jacoco/

      - name: Package Application
        run: mvn package -DskipTests -B

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-pharmacy-java${{ needs.setup.outputs.java-version }}
          path: ${{ env.WORKING_DIR }}/target/*.war
          retention-days: 30

  code-quality:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest
    needs: [setup, build-and-test]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'semeru'
          cache: 'maven'

      - name: Install WebSphere dependency
        run: |
          mvn install:install-file \
            -Dfile=was_dependency/was_public-9.0.0.jar \
            -DpomFile=was_dependency/was_public-9.0.0.pom

      - name: Run SpotBugs Analysis
        run: mvn spotbugs:check -B
        continue-on-error: true

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -B
        continue-on-error: true

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            ${{ env.WORKING_DIR }}/target/spotbugsXml.xml
            ${{ env.WORKING_DIR }}/target/dependency-check-report.html

  container-build:
    name: Build Container Image (Podman)
    runs-on: ubuntu-latest
    needs: [setup, build-and-test]
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
      image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: simple-pharmacy-java${{ needs.setup.outputs.java-version }}
          path: ${{ env.WORKING_DIR }}/target/

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Build image with Podman
        run: |
          podman build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref != 'refs/heads/demo-java8-baseline'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref != 'refs/heads/demo-java8-baseline'
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Save container image artifact (non-push runs)
        if: github.event_name != 'push' || github.ref == 'refs/heads/demo-java8-baseline'
        run: podman save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -o simple-pharmacy-image.tar

      - name: Upload container image artifact
        if: github.event_name != 'push' || github.ref == 'refs/heads/demo-java8-baseline'
        uses: actions/upload-artifact@v4
        with:
          name: container-image-java${{ needs.setup.outputs.java-version }}
          path: ${{ env.WORKING_DIR }}/simple-pharmacy-image.tar
          retention-days: 7

  coverage-gate:
    name: Coverage Gate (30% minimum)
    runs-on: ubuntu-latest
    needs: [setup, build-and-test]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ needs.setup.outputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ needs.setup.outputs.java-version }}
          distribution: 'semeru'
          cache: 'maven'

      - name: Install WebSphere dependency
        run: |
          mvn install:install-file \
            -Dfile=was_dependency/was_public-9.0.0.jar \
            -DpomFile=was_dependency/was_public-9.0.0.pom

      - name: Check Coverage
        run: mvn verify -B

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ env.WORKING_DIR }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 30
          min-coverage-changed-files: 30

  approval-gate:
    name: Deployment Approval Required
    runs-on: ubuntu-latest
    needs: [setup, build-and-test, code-quality, container-build, coverage-gate]
    if: github.ref == 'refs/heads/demo-modernized' && github.event_name == 'push'
    environment:
      name: production-approval
      url: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Approval Checkpoint
        run: |
          echo "All automated checks passed!"
          echo "Build: Success | Tests: Passed | Security: Scanned | Container: Built | Coverage: Met"
          echo "Deployment approved by: ${{ github.actor }} at $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [setup, build-and-test, code-quality, container-build, coverage-gate]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Java Modernization Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Java Version**: ${{ needs.setup.outputs.java-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime**: ${{ needs.setup.outputs.runtime }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build & Test**: ${{ needs.build-and-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Build**: ${{ needs.container-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Gate**: ${{ needs.coverage-gate.result }}" >> $GITHUB_STEP_SUMMARY

