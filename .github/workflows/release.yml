name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  MAVEN_OPTS: -Xmx1024m
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/simple-pharmacy
  WORKING_DIR: simple-pharmacy-twas-j8-struts-V2

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          cat > release_notes.md << EOF
          ## What's Changed
          $COMMITS

          ## Artifacts
          - **WAR File**: \`simple-pharmacy.war\`
          - **Container Image**: \`ghcr.io/${{ github.repository }}/simple-pharmacy:${{ steps.get_version.outputs.version }}\`

          ## Installation
          \`\`\`bash
          podman pull ghcr.io/${{ github.repository }}/simple-pharmacy:${{ steps.get_version.outputs.version }}
          podman run -p 9080:9080 ghcr.io/${{ github.repository }}/simple-pharmacy:${{ steps.get_version.outputs.version }}
          \`\`\`
          EOF

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}

  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'semeru'
          cache: 'maven'

      - name: Install WebSphere dependency
        run: |
          mvn install:install-file \
            -Dfile=was_dependency/was_public-9.0.0.jar \
            -DpomFile=was_dependency/was_public-9.0.0.pom

      - name: Build and Package
        run: |
          mvn clean package -DskipTests -B
          cd target
          sha256sum simple-pharmacy.war > simple-pharmacy.war.sha256

      - name: Upload WAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.WORKING_DIR }}/target/simple-pharmacy.war
          asset_name: simple-pharmacy-${{ needs.create-release.outputs.version }}.war
          asset_content_type: application/java-archive

      - name: Upload SHA256
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.WORKING_DIR }}/target/simple-pharmacy.war.sha256
          asset_name: simple-pharmacy-${{ needs.create-release.outputs.version }}.war.sha256
          asset_content_type: text/plain

  build-and-push-container:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [create-release, build-release-artifacts]
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'semeru'
          cache: 'maven'

      - name: Build WAR
        run: |
          mvn install:install-file \
            -Dfile=was_dependency/was_public-9.0.0.jar \
            -DpomFile=was_dependency/was_public-9.0.0.pom
          mvn clean package -DskipTests -B

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push container image
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          podman build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} .
          podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          VERSION=${{ needs.create-release.outputs.version }}
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} -o spdx-json > sbom.spdx.json

      - name: Upload SBOM to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.WORKING_DIR }}/sbom.spdx.json
          asset_name: sbom-${{ needs.create-release.outputs.version }}.spdx.json
          asset_content_type: application/json

