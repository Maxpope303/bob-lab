# ansible.cfg — Project-scoped Ansible configuration.
[defaults]
inventory           = inventories/dev/hosts.ini
roles_path          = roles
collections_paths   = collections
host_key_checking   = False
retry_files_enabled = False
# Use the built-in default callback with yaml output (community.general.yaml
# was removed in community.general 12.0.0)
stdout_callback     = ansible.builtin.default
result_format       = yaml

[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s
